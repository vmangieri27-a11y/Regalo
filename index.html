<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Un filo per te</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root{
  --rose:#ff4d6d;
  --rose-dark:#c9184a;
  --gold:#ffd36b;
  --gold-glow:#ffb703;
  --navy:#050712;
  --navy2:#0b1430;
  --navy3:#182042;
  --text:#f0e6ff;
  --muted:rgba(240,230,255,0.55);
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--navy);
  font-family:'Georgia',serif;
  color:var(--text);
  position: fixed;
}

canvas{display:block;position:fixed;inset:0;}

/* ─── SCREENS ─── */
.screen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  text-align:center;
  padding:24px;
  z-index:20;
  background:radial-gradient(ellipse at 50% 40%,#0f1e45,var(--navy) 75%);
  transition:opacity .5s ease;
}
.screen.fade-out{opacity:0;pointer-events:none;}
.screen.hidden{display:none !important;}

.screen h1{
  font-size:clamp(20px,5vw,32px);
  font-weight:400;
  letter-spacing:3px;
  margin-bottom:10px;
  color:var(--text);
}
.screen p{
  font-size:clamp(13px,3.5vw,16px);
  color:var(--muted);
  max-width:320px;
  line-height:1.6;
  margin-bottom:8px;
}

/* star divider */
.divider{
  color:var(--gold);
  letter-spacing:12px;
  margin:14px 0;
  font-size:14px;
}

/* ─── BUTTONS ─── */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:13px 32px;
  font-family:'Georgia',serif;
  font-size:15px;
  letter-spacing:1.5px;
  color:var(--text);
  background:transparent;
  border:1px solid rgba(240,230,255,0.4);
  border-radius:40px;
  cursor:pointer;
  transition:background .2s, border-color .2s, transform .1s;
  -webkit-appearance:none;
}
.btn:hover{background:rgba(255,255,255,0.07);border-color:rgba(240,230,255,0.7);}
.btn:active{transform:scale(0.97);}
.btn-gold{border-color:var(--gold);color:var(--gold);}
.btn-gold:hover{background:rgba(255,211,107,0.1);}

/* ─── PROGRESS BAR & HUD ─── */
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  z-index:15;
}
#progress-track{
  flex:1;height:4px;
  background:rgba(255,255,255,0.1);
  border-radius:4px;
  overflow:hidden;
}
#progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--rose),var(--gold));
  border-radius:4px;
  width:0%;
  transition:width .3s ease;
}
#hud-label{
  font-size:12px;letter-spacing:1px;color:var(--muted);white-space:nowrap;
}
.skip-btn {
  pointer-events: auto;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(240,230,255,0.3);
  color: var(--text);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
}

/* ─── MOBILE CONTROLS ─── */
#controls{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 24px 24px;
  z-index:10;
  pointer-events:none;
}
.ctrl-group{display:flex;gap:10px;pointer-events:all;}

.ctrl{
  width:58px;height:58px;
  border:1px solid rgba(240,230,255,0.25);
  border-radius:16px;
  background:rgba(10,16,42,0.7);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  color:rgba(240,230,255,0.7);
  user-select:none;
  cursor:pointer;
  touch-action:none;
  transition:background .1s,border-color .1s;
}
.ctrl:active,.ctrl.active{
  background:rgba(255,77,109,0.2);
  border-color:rgba(255,77,109,0.6);
}
#jump-btn{
  width:70px;height:70px;
  border-radius:50%;
  border-color:rgba(255,211,107,0.35);
  font-size:26px;
  pointer-events: all;
}
